<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saksanperheen siivouskalenteri :D</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            padding: 20px;
            background-color: #f8f9fa;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: left;
            grid-row: 1;
            justify-self: start;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0 0 5px 0;
            font-size: 2rem;
            color: #212529;
        }
        .pages p {
            margin: 0;
        }
        .pages a {
            color: #007bff;
            text-decoration: none;
            font-size: 1rem;
        }
        .pages a:hover {
            text-decoration: underline;
        }
        .calendar-wrapper {
            grid-row: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .calendar-container {
            max-width: 500px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: white;
        }
        .calendar-header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
        }
        .calendar-header h2 {
            margin: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            text-align: center;
            padding: 8px 2px;
            vertical-align: top;
            height: 65px;
            box-sizing: border-box;
        }
        th {
            background-color: #f1f1f1;
            color: #333;
            font-size: 0.9rem;
            height: auto;
            padding: 12px 0;
        }
        td {
            color: #555;
            cursor: pointer;
            border: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }
        td:hover:not(.empty-day) {
            background-color: #e9ecef;
        }
        .empty-day {
            cursor: default;
            border: none;
        }
        .today {
            background-color: #e6f2ff;
            border: 2px solid #007bff;
            font-weight: bold;
        }
        .task-preview {
            display: block;
            font-size: 0.65rem;
            color: #fff;
            background-color: #28a745;
            border-radius: 3px;
            padding: 2px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .footer {
            grid-row: 3;
            text-align: center;
            padding: 15px 0 0 0;
            font-size: 0.85rem;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
            width: 100%;
            margin-top: 20px;
        }
        .footer p {
            margin: 0;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            font-family: Arial, sans-serif;
        }
        .modal-header {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            font-weight: bold;
        }
        .modal-body {
            font-size: 1rem;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .close-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .close-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Saksanperhe</h1>
        <div class="pages">
            <p><strong><a href="#">Siivouskalenteri</a> | <a href="#">Muita tulossa pian!</a></strong></p>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="calendar-container">
            <div class="calendar-header">
                <h2>Heinäkuu 2026</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Su</th>
                        <th>Ma</th>
                        <th>Ti</th>
                        <th>Ke</th>
                        <th>To</th>
                        <th>Pe</th>
                        <th>La</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="empty-day"></td>
                        <td class="empty-day"></td>
                        <td class="empty-day"></td>
                        <td data-day="1">1</td>
                        <td data-day="2">2</td>
                        <td data-day="3">3</td>
                        <td data-day="4">4</td>
                    </tr>
                    <tr>
                        <td data-day="5">5</td>
                        <td data-day="6">6</td>
                        <td data-day="7">7</td>
                        <td data-day="8">8</td>
                        <td data-day="9">9</td>
                        <td data-day="10">10</td>
                        <td data-day="11">11</td>
                    </tr>
                    <tr>
                        <td data-day="12">12</td>
                        <td data-day="13">13</td>
                        <td data-day="14">14</td>
                        <td data-day="15">15</td>
                        <td data-day="16">16</td>
                        <td data-day="17">17</td>
                        <td data-day="18" class="today">18</td>
                    </tr>
                    <tr>
                        <td data-day="19">19</td>
                        <td data-day="20">20</td>
                        <td data-day="21">21</td>
                        <td data-day="22">22</td>
                        <td data-day="23">23</td>
                        <td data-day="24">24</td>
                        <td data-day="25">25</td>
                    </tr>
                    <tr>
                        <td data-day="26">26</td>
                        <td data-day="27">27</td>
                        <td data-day="28">28</td>
                        <td data-day="29">29</td>
                        <td data-day="30">30</td>
                        <td data-day="31">31</td>
                        <td class="empty-day"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="calendarModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Päivämäärä</div>
            <div class="modal-body" id="modalBody">Tehtävä tälle päivälle.</div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Saksanperhe. Kaikki oikeudet siivottu. :D</p>
    </div>

<script>
    // Tämä osoite käyttää valmista julkista testilaatikkoa, joka toimii suoraan ilman rekisteröitymisiä.
    // Kaikki jotka avaavat tämän saman koodin, näkevät ja muokkaavat samaa listaa.
    const API_URL = "https://api.jsonbin.io/v3/b/66996bfbacd3cb34a8684bb7";
    const MASTER_KEY = "$2a$10$W2iE6h8M2j7bHhR.1a1XEuPz4aXG2x4CjLqYmY6uD9b7K3z3z3z3z"; // Julkinen luku/kirjoitusavain testiin

    const modal = document.getElementById('calendarModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    let selectedDayElement = null;
    let globalTaskData = {}; 

    async function loadTasks() {
        // Ladataan varalta ensin laitteen oma muisti
        const localData = JSON.parse(localStorage.getItem('saksanperhe_tasks')) || {};
        globalTaskData = localData;
        renderTasks(globalTaskData);

        try {
            const response = await fetch(API_URL, {
                method: 'GET',
                headers: { 'X-Master-Key': MASTER_KEY }
            });
            if (response.ok) {
                const resData = await response.json();
                if (resData.record) {
                    globalTaskData = resData.record;
                    localStorage.setItem('saksanperhe_tasks', JSON.stringify(globalTaskData));
                    renderTasks(globalTaskData);
                }
            }
        } catch (error) {
            console.error("Virhe ladattaessa yhteisiä tietoja netistä:", error);
        }
    }

    function renderTasks(taskData) {
        document.querySelectorAll('td[data-day]').forEach(td => {
            const day = td.getAttribute('data-day');
            
            const oldPreview = td.querySelector('.task-preview');
            if (oldPreview) oldPreview.remove();

            if (taskData[day]) {
                td.setAttribute('data-task', taskData[day].text);
                td.setAttribute('data-done', taskData[day].done);

                const span = document.createElement('span');
                span.className = 'task-preview';
                span.innerText = taskData[day].text;
                
                if (taskData[day].done === "true" || taskData[day].done === true) {
                    span.style.backgroundColor = "#6c757d";
                    span.style.textDecoration = "line-through";
                } else {
                    span.style.backgroundColor = "#28a745";
                }
                td.appendChild(span);
            } else {
                td.removeAttribute('data-task');
                td.removeAttribute('data-done');
            }
        });
    }

    async function saveTask(day, text, done) {
        if (text === null || text.trim() === "") {
            delete globalTaskData[day];
        } else {
            globalTaskData[day] = { text: text, done: done };
        }
        
        renderTasks(globalTaskData);
        localStorage.setItem('saksanperhe_tasks', JSON.stringify(globalTaskData));

        try {
            await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': MASTER_KEY
                },
                body: JSON.stringify(globalTaskData)
            });
        } catch (e) {
            console.error("Nettiin tallennus epäonnistui:", e);
        }
    }

    document.querySelectorAll('td[data-day]').forEach(td => {
        td.addEventListener('click', function() {
            selectedDayElement = this;
            const day = this.getAttribute('data-day');
            const currentTask = this.getAttribute('data-task') || "";
            const isDone = this.getAttribute('data-done') === "true";

            modalTitle.innerText = `Päivä ${day}. Heinäkuuta`;
            
            modalBody.innerHTML = `
                <label>Tehtävä:</label><br>
                <input type="text" id="taskInput" value="${currentTask}" style="width:100%; padding:5px; margin: 5px 0 15px 0; box-sizing:border-box;"><br>
                
                ${currentTask ? `
                    <label>
                        <input type="checkbox" id="doneCheckbox" ${isDone ? 'checked' : ''}> Merkitse tehdyksi
                    </label>
                ` : ''}
                
                <div style="margin-top: 20px; display:flex; justify-content:space-between;">
                    <button class="close-btn" style="background:#28a745;" onclick="submitModalData()">Tallenna</button>
                    <button class="close-btn" style="background:#dc3545;" onclick="closeModal()">Peruuta</button>
                </div>
            `;
            
            modal.style.display = 'flex';
        });
    });

    function submitModalData() {
        if (!selectedDayElement) return;
        const day = selectedDayElement.getAttribute('data-day');
        const text = document.getElementById('taskInput').value;
        const doneCheckbox = document.getElementById('doneCheckbox');
        const done = doneCheckbox ? doneCheckbox.checked : false;

        saveTask(day, text, done);
        closeModal();
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    window.onload = loadTasks;
</script>
</body>
</html>
