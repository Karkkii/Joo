<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipsa Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pipsa Clicker - Klikkaa Pipsaa ja kerää pisteitä!">
    <meta name="keywords" content="Pipsa, clicker, peli, minipeli, browsergame, Saksanperhe">
    <meta name="footer" content="(C) Dusty 2026">
    <meta name="robots" content="index, follow">
    <style>
        body {
            font-family: 'Montserrat', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
            overflow-x: hidden;
        }

        .score-container {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #counter {
            font-size: 5rem;
            font-weight: 900;
            color: #00ffcc;
            margin: 5px 0;
        }

        #high-score {
            font-size: 1.2rem;
            color: #ffbd59;
            font-weight: bold;
        }

        .daily-container {
            background: rgba(255, 189, 89, 0.2);
            border: 2px dashed #ffbd59;
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-daily {
            background: #ffbd59;
            color: #1e3c72;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-daily:hover:not(:disabled) {
            transform: scale(1.05);
            background: #ffe082;
        }
        .btn-daily:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        .img-container {
            position: relative;
            cursor: pointer;
            margin: 15px 0;
        }

        #pop-image {
            width: 260px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 4px solid white;
            transition: transform 0.05s ease;
        }

        /* TÄMÄ tekee klikkausanimaation, vaikka kuva ei vaihtuisikaan */
        .img-container:active #pop-image {
            transform: scale(1.15) rotate(3deg);
        }

        .particle {
            position: absolute;
            width: 40px;
            height: 40px;
            background-image: url('parempipipsa.jpg');
            background-size: cover;
            border-radius: 50%;
            pointer-events: none;
            animation: fly 0.6s ease-out forwards;
            opacity: 0.8;
            border: 2px solid white;
            z-index: 10;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0) rotate(360deg); opacity: 0; }
        }

        .game-features {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            max-width: 600px;
            width: 100%;
        }

        .panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .panel h2 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }

        .btn {
            background: #ff4500;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.03);
            background: #ff5714;
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-roulette { background: #28a745; }
        .btn-roulette:hover:not(:disabled) { background: #218838; }

        #autoclicker-info {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 5px;
        }

        #roulette-result {
            margin-top: 10px;
            font-weight: bold;
            min-height: 20px;
        }

        #reset-btn {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0.6;
        }
        #reset-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="daily-container">
        <span id="daily-status">Päivittäinen palkinto on valmis! 🎁</span>
        <button id="claim-daily" class="btn-daily">Lunasta palkinto</button>
    </div>

    <div class="score-container">
        <h1>Klikkaukset</h1>
        <div id="counter">0</div>
        <div id="high-score">Ennätys: 0</div>
    </div>

    <div class="img-container" id="click-zone">
        <img id="pop-image" src="parempipipsa.jpg" alt="Pipsa">
    </div>

    <div class="game-features">
        <div class="panel">
            <h2>Kauppa 🛒</h2>
            <button id="buy-autoclicker" class="btn">Osta Autoclicker<br>(Hinta: <span id="autoclicker-cost">50</span>)</button>
            <div id="autoclicker-info">Omistat: <span id="autoclicker-count">0</span> (<span id="cps-count">0</span>/s)</div>
        </div>

        <div class="panel">
            <h2>Ruletti 🎰</h2>
            <p style="font-size: 0.85rem; margin: 0 0 10px 0;">Pelaa kaikilla klikkauksillasi! 50% tuplaa, 50% häviät kaiken.</p>
            <button id="play-roulette" class="btn btn-roulette">Pelaa Rulettia</button>
            <div id="roulette-result"></div>
        </div>
    </div>
    <div class="leaderboard">
        <h1>Parhaat tilastot 📊</h1>
        <p style="font-size: 0.9rem; margin: 5px 0;">Error loading data from database: 404 Page not found</p>
    </div>

    <button id="reset-btn">Nollaa kaikki tiedot</button>

    <script>
        const popImage = document.getElementById('pop-image');
        const clickZone = document.getElementById('click-zone');
        const counterDisplay = document.getElementById('counter');
        const highScoreDisplay = document.getElementById('high-score');
        const resetBtn = document.getElementById('reset-btn');
        
        const buyAutoclickerBtn = document.getElementById('buy-autoclicker');
        const autoclickerCostDisplay = document.getElementById('autoclicker-cost');
        const autoclickerCountDisplay = document.getElementById('autoclicker-count');
        const cpsDisplay = document.getElementById('cps-count');
        
        const playRouletteBtn = document.getElementById('play-roulette');
        const rouletteResult = document.getElementById('roulette-result');

        const claimDailyBtn = document.getElementById('claim-daily');
        const dailyStatus = document.getElementById('daily-status');

        let score = localStorage.getItem('pop_score') ? parseInt(localStorage.getItem('pop_score')) : 0;
        let highScore = localStorage.getItem('pop_highscore') ? parseInt(localStorage.getItem('pop_highscore')) : 0;
        let autoclickers = localStorage.getItem('pop_autoclickers') ? parseInt(localStorage.getItem('pop_autoclickers')) : 0;
        let autoclickerCost = localStorage.getItem('pop_autoclickercost') ? parseInt(localStorage.getItem('pop_autoclickercost')) : 50;
        let lastDailyClaim = localStorage.getItem('pop_lastdaily') ? parseInt(localStorage.getItem('pop_lastdaily')) : 0;

        updateUI();
        checkDailyReward();

        setInterval(checkDailyReward, 1000);

        setInterval(() => {
            if (autoclickers > 0) {
                score += autoclickers;
                checkHighScore();
                updateUI();
            }
        }, 1000);

        function updateUI() {
            counterDisplay.textContent = score;
            highScoreDisplay.textContent = `Ennätys: ${highScore}`;
            autoclickerCountDisplay.textContent = autoclickers;
            cpsDisplay.textContent = autoclickers;
            autoclickerCostDisplay.textContent = autoclickerCost;

            buyAutoclickerBtn.disabled = score < autoclickerCost;
            playRouletteBtn.disabled = score === 0;

            localStorage.setItem('pop_score', score);
            localStorage.setItem('pop_highscore', highScore);
            localStorage.setItem('pop_autoclickers', autoclickers);
            localStorage.setItem('pop_autoclickercost', autoclickerCost);
        }

        function checkHighScore() {
            if (score > highScore) highScore = score;
        }

        function popStart(e) {
            score++;
            checkHighScore();
            updateUI();
            createParticle(e);
        }

        // Tässä ei tarvitse enää vaihtaa kuvaa takaisin, koska kuva ei muutu
        function checkDailyReward() {
            const now = new Date().getTime();
            const cooldown = 24 * 60 * 60 * 1000;
            const timePassed = now - lastDailyClaim;

            if (timePassed >= cooldown) {
                dailyStatus.textContent = "Päivittäinen palkinto on valmis! 🎁";
                claimDailyBtn.disabled = false;
            } else {
                const timeLeft = cooldown - timePassed;
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                
                dailyStatus.textContent = `Seuraava palkinto saatavilla: ${hours}h ${minutes}m ${seconds}s`;
                claimDailyBtn.disabled = true;
            }
        }

        claimDailyBtn.addEventListener('click', () => {
            const now = new Date().getTime();
            lastDailyClaim = now;
            localStorage.setItem('pop_lastdaily', lastDailyClaim);

            const baseReward = Math.floor(Math.random() * 401) + 100;
            const bonusReward = autoclickers * 50;
            const totalReward = baseReward + bonusReward;

            score += totalReward;
            checkHighScore();
            updateUI();
            checkDailyReward();

            alert(`Lunastit päivittäisen palkinnon! Sait +${totalReward} klikkausta! 🎉`);
        });

        buyAutoclickerBtn.addEventListener('click', () => {
            if (score >= autoclickerCost) {
                score -= autoclickerCost;
                autoclickers++;
                autoclickerCost = Math.floor(autoclickerCost * 1.5);
                updateUI();
            }
        });

        playRouletteBtn.addEventListener('click', () => {
            if (score <= 0) return;
            playRouletteBtn.disabled = true;
            rouletteResult.style.color = "white";
            rouletteResult.textContent = "Ruletti pyörii...";

            setTimeout(() => {
                if (Math.random() < 0.5) {
                    score = score * 2;
                    rouletteResult.style.color = "#00ffcc";
                    rouletteResult.textContent = "TUPLAUS! 🎉";
                } else {
                    score = 0;
                    rouletteResult.style.color = "#ff4500";
                    rouletteResult.textContent = "HÄVISIT KAIKEN! 💀";
                }
                checkHighScore();
                updateUI();
            }, 1000);
        });

        function createParticle(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if (!clientX || !clientY) return;

            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = `${clientX}px`;
            particle.style.top = `${clientY}px`;

            const angle = Math.random() * Math.PI * 2;
            const velocity = 50 + Math.random() * 100;
            const x = Math.cos(angle) * velocity;
            const y = Math.sin(angle) * velocity;

            particle.style.setProperty('--x', `${x}px`);
            particle.style.setProperty('--y', `${y}px`);

            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        clickZone.addEventListener('mousedown', (e) => popStart(e));
        clickZone.addEventListener('touchstart', (e) => { e.preventDefault(); popStart(e); });

        resetBtn.addEventListener('click', () => {
            if(confirm("Haluatko varmasti nollata KAIKKI tiedot? Pisteet, autoclickerit ja päivittäisen palkinnon ajastin nollataan.")) {
                score = 0; highScore = 0; autoclickers = 0; autoclickerCost = 50; lastDailyClaim = 0;
                localStorage.clear();
                rouletteResult.textContent = "";
                updateUI();
                checkDailyReward();
            }
        });
    </script>
</body>
</html>
